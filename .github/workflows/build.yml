name: Build Hybrid-Mount

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - 'tools/notify/**'
      - '.github/workflows/build-kasumi-lkm.yml'
      - '.github/workflows/kasumi-lkm.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - 'tools/notify/**'
      - '.github/workflows/build-kasumi-lkm.yml'
      - '.github/workflows/kasumi-lkm.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-kasumi-lkm:
    uses: ./.github/workflows/build-kasumi-lkm.yml
    secrets: inherit

  build:
    needs: build-kasumi-lkm
    name: Build packages (full + lite + nano)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download Kasumi LKM artifacts
        uses: actions/download-artifact@v8
        with:
          path: kasumi_lkm_artifacts
          pattern: "*-kasumi-lkm"
          merge-multiple: true

      - name: Download Kasumi UAPI
        uses: actions/download-artifact@v8
        with:
          name: kasumi-uapi
          path: kasumi_uapi_artifact

      - name: Sync Kasumi UAPI
        run: |
          set -euo pipefail
          mapfile -t UAPI_FILES < <(find kasumi_uapi_artifact -type f -name kasumi_uapi.h | sort)
          if [ "${#UAPI_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly one kasumi_uapi.h artifact, found ${#UAPI_FILES[@]}:"
            find kasumi_uapi_artifact -type f -print | sort
            exit 1
          fi
          cp "${UAPI_FILES[0]}" src/sys/kasumi_uapi.h
          sha256sum src/sys/kasumi_uapi.h

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Resolve pnpm store path
        id: pnpm-store
        run: |
          set -euo pipefail
          STORE_PATH="$(pnpm store path --silent)"
          mkdir -p "$STORE_PATH"
          echo "path=$STORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build Full
        env:
          HYBRID_MOUNT_NOTIFY: "0"
          HYBRID_MOUNT_KASUMI_LKM_DIR: ${{ github.workspace }}/kasumi_lkm_artifacts
        run: |
          set -euo pipefail
          ls -la "$HYBRID_MOUNT_KASUMI_LKM_DIR"
          rm -rf output
          cargo xtask build --ci --flavor full
          ZIP_PATH="$(find output -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          test -n "$ZIP_PATH"
          ZIP_FILENAME="$(basename "$ZIP_PATH")"
          FULL_ARTIFACT="${ZIP_FILENAME%.*}"
          echo "FULL_ZIP=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "FULL_ARTIFACT=$FULL_ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload Full Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.FULL_ARTIFACT }}
          path: ${{ env.FULL_ZIP }}
          if-no-files-found: error

      - name: Build Lite
        env:
          HYBRID_MOUNT_NOTIFY: "0"
        run: |
          set -euo pipefail
          rm -rf output
          cargo xtask build --ci --flavor lite
          ZIP_PATH="$(find output -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          test -n "$ZIP_PATH"
          ZIP_FILENAME="$(basename "$ZIP_PATH")"
          LITE_ARTIFACT="${ZIP_FILENAME%.*}"
          echo "LITE_ZIP=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "LITE_ARTIFACT=$LITE_ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload Lite Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LITE_ARTIFACT }}
          path: ${{ env.LITE_ZIP }}
          if-no-files-found: error

      - name: Build Nano
        env:
          HYBRID_MOUNT_NOTIFY: "0"
        run: |
          set -euo pipefail
          rm -rf output
          cargo xtask build --ci --flavor nano
          ZIP_PATH="$(find output -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          test -n "$ZIP_PATH"
          ZIP_FILENAME="$(basename "$ZIP_PATH")"
          NANO_ARTIFACT="${ZIP_FILENAME%.*}"
          echo "NANO_ZIP=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "NANO_ARTIFACT=$NANO_ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload Nano Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.NANO_ARTIFACT }}
          path: ${{ env.NANO_ZIP }}
          if-no-files-found: error

  notify:
    needs: build
    if: github.event_name != 'pull_request'
    name: Notify packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/hybrid-mount/meta-hybrid_mount-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: notify-output
          pattern: Hybrid-Mount-*
          merge-multiple: true

      - name: Notify Telegram album
        env:
          HYBRID_MOUNT_NOTIFY: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          mapfile -t ZIP_FILES < <(find notify-output -maxdepth 1 -type f -name '*.zip' | sort)
          if [ "${#ZIP_FILES[@]}" -ne 3 ]; then
            echo "Expected 3 package artifacts, found ${#ZIP_FILES[@]}:"
            find notify-output -maxdepth 2 -type f -print | sort
            exit 1
          fi
          cargo xtask notify \
            --output notify-output \
            --label "日常耕作 🌱 (Daily Tilling) [full+lite+nano] - ${{ github.ref_name }}" \
            --topic-id 37
